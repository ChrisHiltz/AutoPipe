name: Signal Ingestion
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: signal-ingest-${{ github.event.issue.number }}
  cancel-in-progress: false

# Only trigger for issues with signal:* labels
jobs:
  ingest:
    name: Ingest Signal
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'signal:bug') ||
      contains(github.event.issue.labels.*.name, 'signal:feature') ||
      contains(github.event.issue.labels.*.name, 'signal:feedback') ||
      contains(github.event.issue.labels.*.name, 'signal:analytics')
    steps:
      - uses: actions/checkout@v4

      - name: Determine signal type
        id: classify
        run: |
          LABELS='${{ toJSON(github.event.issue.labels.*.name) }}'
          if echo "$LABELS" | grep -q "signal:bug"; then
            echo "type=bug" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "signal:feature"; then
            echo "type=feature" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "signal:feedback"; then
            echo "type=feedback" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q "signal:analytics"; then
            echo "type=analytics" >> "$GITHUB_OUTPUT"
          else
            echo "type=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Create raw input document
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_DATE: ${{ github.event.issue.created_at }}
          SIGNAL_TYPE: ${{ steps.classify.outputs.type }}
          REPO_NAME: ${{ github.repository }}
        run: |
          chmod +x scripts/ingest-signal.sh
          ./scripts/ingest-signal.sh

      - name: Create branch and commit
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Trap: notify on failure so signals are never silently lost
          trap 'gh issue comment "$ISSUE_NUMBER" --body "Build-Pipe ingestion failed. [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" || true' ERR

          BRANCH="signal/${ISSUE_NUMBER}"

          # Idempotency: if branch already exists, this signal was already ingested
          if git ls-remote --heads origin "$BRANCH" 2>/dev/null | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists — signal already ingested. Skipping."
            exit 0
          fi

          git config user.name "build-pipe[bot]"
          git config user.email "build-pipe[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "docs/01-raw-inputs/SIG-${ISSUE_NUMBER}.md"
          git commit -m "ingest: capture signal SIG-${ISSUE_NUMBER} from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          SIGNAL_TYPE: ${{ steps.classify.outputs.type }}
        run: |
          gh pr create \
            --title "signal: SIG-${ISSUE_NUMBER} — ${ISSUE_TITLE}" \
            --body "$(cat <<EOF
          ## Signal Ingestion

          Captured from issue #${ISSUE_NUMBER}.

          - **Type:** ${SIGNAL_TYPE}
          - **Source:** [Issue #${ISSUE_NUMBER}](https://github.com/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER})

          ### Next Steps
          Once merged, the pipeline will process this signal through discovery → architecture → specification → code.

          ---
          *Auto-generated by Build-Pipe signal ingestion.*
          EOF
          )" \
            --base main \
            --head "signal/${ISSUE_NUMBER}" \
            --label "pipeline:signal"

      - name: Comment on original issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PR_URL=$(gh pr list --head "signal/${ISSUE_NUMBER}" --json url -q '.[0].url')
          gh issue comment "$ISSUE_NUMBER" --body "Signal captured and ingested into the pipeline. Tracking PR: ${PR_URL}"

      - name: Update project board
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          ISSUE_URL="${{ github.server_url }}/${{ github.repository }}/issues/${ISSUE_NUMBER}"
          chmod +x scripts/update-project-board.sh
          ./scripts/update-project-board.sh "$ISSUE_URL" "Signal Received" || true
