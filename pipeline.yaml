# pipeline.yaml — Controls how the Build-Pipe pipeline operates.
#
# Three modes:
#   discovery    — Fresh product. Batch signals, synthesize into architecture, then execute.
#   execution    — Locked build plan exists. Read tasks, respect dependencies, spawn agents.
#   steady-state — Live product. Process signals one-at-a-time through the full pipeline.
#
# Switch modes as your product matures:
#   Day 1 (customer interviews)        → discovery
#   Build plan locked (ready to build)  → execution
#   Product is live (maintenance)       → steady-state

mode: steady-state  # discovery | execution | steady-state

# ─── Discovery Mode Settings ───────────────────────────────
# Used when starting a new product from customer research.
discovery:
  synthesis_threshold: 5        # Batch this many signals before synthesizing into architecture

# ─── Execution Mode Settings ───────────────────────────────
# Used when you have a locked build plan with tasks, dependencies, and acceptance criteria.
execution:
  build_plan_dir: ./build-plan                    # Path to your build plan directory
  workstream_dir: ./build-plan/workstreams        # Path to workstream subdirectories
  max_parallel_tasks: 7                            # Max concurrent agent sessions per merge wave (ao has no limit — scale freely)
  # Dependencies and human gates are always enforced — tasks with unmet
  # dependencies stay blocked, and must_review tasks get the pipeline:human-gate
  # label automatically. These behaviors are built into the workflows, not toggleable.

# ─── Steady-State Mode Settings ────────────────────────────
# Signal ingestion is always automatic (signal-ingestion.yml fires on any
# signal:* labeled issue). Proposal approval is enforced by branch protection
# rules — configure these in GitHub repo settings, not here.
steady_state: {}                # No configurable settings — behavior is driven by workflows and branch protection

# ─── Shared Settings ──────────────────────────────────────
tracker: github                 # github (where issues/tasks are tracked)
agent: claude-code              # claude-code | codex | aider (which AI agent to use)
agent_rules_file: .agent-rules.md
